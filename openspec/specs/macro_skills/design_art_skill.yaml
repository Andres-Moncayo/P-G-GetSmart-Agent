schema: spec-driven

# ============================================================
# Artifact: design_art_skill.yaml
# Domain: Macro-Skill — Design and Art Analysis
# Phase: 3 (Parallel Analysis)
# Status: draft
# ============================================================

artifact:
  id: design_art_skill
  name: Design and Art Macro-Skill
  version: "1.0.0"
  author: GetSmart Team
  created_at: "2026-06-17"
  status: draft
  description: |
    Analyzes game design and artistic elements across 5 thematic categories:
    Gameplay, Level Design, Narrative, Art Direction, and Sound Design.
    Receives the Design & Art Mini-Context produced by Phase 1 and defined by
    `master_json_schema.yaml`. Outputs structured intelligence for the Synthesizer (Phase 4).

# ============================================================
# 1. INPUT CONTRACT
# ============================================================
input:
  source: "mini_contexts.design_art"
  schema_ref: "master_json_schema.yaml#/definitions/mini_context_design_art"
  description: |
    Receives exclusively the Design & Art Mini-Context containing:
    - metadata: Worker execution info
    - hard_data: Structured data from IGDB, RAWG, Steam (genres, themes, storyline, achievements, etc.)
    - semantic_data: Tavily sources organized by 5 categories
    - evidence_count & confidence_score

  data_includes:
    hard_data:
      - genres, themes, game_modes, player_perspectives
      - game_engines, franchises, collections
      - storyline, summary, description_raw
      - cover_url, screenshots, videos, artworks
      - metacritic, esrb_rating, ratings_distribution
      - achievements_schema
    semantic_data:
      - gameplay_mechanics.sources[]
      - level_design.sources[]
      - narrative.sources[]
      - art_direction.sources[]
      - sound_design.sources[]

# ============================================================
# 2. OUTPUT CONTRACT
# ============================================================
output:
  format: "application/json"
  schema_version: "1.0.0"
  description: |
    Structured analysis JSON. Each category contains synthesized intelligence,
    NOT raw copied data. The LLM analyzes, summarizes, and categorizes
    evidence into actionable insights for the Synthesizer.

  root_schema:
    type: object
    required: ["metadata", "analysis", "summary", "confidence"]

    properties:
      # =====================================================================
      # 2.1 METADATA
      # =====================================================================
      metadata:
        type: object
        required: ["skill_id", "skill_name", "game_id", "game_name", "generated_at", "model_used"]
        properties:
          skill_id:
            type: string
            const: "design_art"
          skill_name:
            type: string
            const: "Design and Art"
          game_id:
            type: string
            format: uuid
          game_name:
            type: string
          generated_at:
            type: string
            format: date-time
          model_used:
            type: string
            const: "gemini-2.5-flash"
          input_evidence_count:
            type: integer
            minimum: 0
          input_confidence_score:
            type: number
            minimum: 0.0
            maximum: 1.0

      # =====================================================================
      # 2.2 ANALYSIS (5 Categories)
      # =====================================================================
      analysis:
        type: object
        required: ["gameplay", "level_design", "narrative", "art_direction", "sound_design"]
        properties:
          # -----------------------------------------------------------------
          # GAMEPLAY
          # -----------------------------------------------------------------
          gameplay:
            type: object
            required: ["category_id", "category_name", "overview", "key_mechanics", "progression_system", "difficulty_balance", "player_feedback", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "gameplay"
              category_name:
                type: string
                const: "Gameplay Mechanics"
              overview:
                type: string
                description: "Executive summary of gameplay design (2-3 sentences)"
              key_mechanics:
                type: array
                items:
                  type: object
                  required: ["mechanic_name", "description", "innovation_level", "player_reception"]
                  properties:
                    mechanic_name:
                      type: string
                    description:
                      type: string
                    innovation_level:
                      type: string
                      enum: ["industry_standard", "evolutionary", "revolutionary"]
                    player_reception:
                      type: string
                      enum: ["negative", "mixed", "positive", "acclaimed"]
              progression_system:
                type: object
                properties:
                  type:
                    type: string
                    enum: ["linear", "branching", "open_ended", "skill_tree", "hybrid"]
                  description:
                    type: string
                  pacing:
                    type: string
                    enum: ["too_slow", "balanced", "too_fast", "uneven"]
              difficulty_balance:
                type: object
                properties:
                  approach:
                    type: string
                    enum: ["handholding", "guided", "challenging", "punishing", "adaptive"]
                  accessibility_options:
                    type: boolean
                  player_sentiment:
                    type: string
              player_feedback:
                type: object
                properties:
                  strengths:
                    type: array
                    items: { type: string }
                  weaknesses:
                    type: array
                    items: { type: string }
                  common_complaints:
                    type: array
                    items: { type: string }
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "steam_reviews", "forums"]
                    relevance: { type: string }

          # -----------------------------------------------------------------
          # LEVEL DESIGN
          # -----------------------------------------------------------------
          level_design:
            type: object
            required: ["category_id", "category_name", "overview", "world_structure", "pacing_flow", "environmental_storytelling", "replayability", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "level_design"
              category_name:
                type: string
                const: "Level Design"
              overview:
                type: string
              world_structure:
                type: object
                properties:
                  type:
                    type: string
                    enum: ["linear", "hub_based", "open_world", "procedural", "hybrid"]
                  description:
                    type: string
                  interconnectedness:
                    type: string
                    enum: ["low", "moderate", "high"]
              pacing_flow:
                type: object
                properties:
                  rhythm:
                    type: string
                    enum: ["constant", "peaks_valleys", "player_driven"]
                  tension_curve:
                    type: string
                  exploration_reward:
                    type: string
                    enum: ["sparse", "balanced", "generous", "overwhelming"]
              environmental_storytelling:
                type: object
                properties:
                  present:
                    type: boolean
                  quality:
                    type: string
                    enum: ["minimal", "functional", "immersive", "masterful"]
                  examples:
                    type: array
                    items: { type: string }
              replayability:
                type: object
                properties:
                  new_game_plus:
                    type: boolean
                  branching_paths:
                    type: boolean
                  procedural_elements:
                    type: boolean
                  player_notes:
                    type: string
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "steam_reviews", "forums"]
                    relevance: { type: string }

          # -----------------------------------------------------------------
          # NARRATIVE
          # -----------------------------------------------------------------
          narrative:
            type: object
            required: ["category_id", "category_name", "overview", "story_quality", "character_development", "worldbuilding", "writing_style", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "narrative"
              category_name:
                type: string
                const: "Narrative"
              overview:
                type: string
              story_quality:
                type: object
                properties:
                  coherence:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
                  emotional_impact:
                    type: string
                    enum: ["low", "moderate", "high", "exceptional"]
                  originality:
                    type: string
                    enum: ["derivative", "familiar", "fresh", "groundbreaking"]
              character_development:
                type: object
                properties:
                  protagonist_depth:
                    type: string
                    enum: ["shallow", "moderate", "deep", "complex"]
                  supporting_cast:
                    type: string
                    enum: ["forgettable", "functional", "memorable", "iconic"]
                  player_agency:
                    type: string
                    enum: ["none", "limited", "meaningful", "full"]
              worldbuilding:
                type: object
                properties:
                  depth:
                    type: string
                    enum: ["surface", "moderate", "deep", "encyclopedic"]
                  lore_integration:
                    type: string
                    enum: ["told", "shown", "environmental", "player_discovered"]
                  consistency:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
              writing_style:
                type: object
                properties:
                  tone:
                    type: string
                    enum: ["light", "dramatic", "dark", "humorous", "epic"]
                  dialogue_quality:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
                  localization_quality:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "steam_reviews", "forums"]
                    relevance: { type: string }

          # -----------------------------------------------------------------
          # ART DIRECTION
          # -----------------------------------------------------------------
          art_direction:
            type: object
            required: ["category_id", "category_name", "overview", "visual_style", "technical_execution", "artistic_consistency", "memorable_moments", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "art_direction"
              category_name:
                type: string
                const: "Art Direction"
              overview:
                type: string
              visual_style:
                type: object
                properties:
                  aesthetic:
                    type: string
                    enum: ["realistic", "stylized", "cartoon", "pixel_art", "minimalist", "photorealistic", "other"]
                  color_palette:
                    type: string
                  art_movement_influence:
                    type: array
                    items: { type: string }
                  distinctiveness:
                    type: string
                    enum: ["generic", "recognizable", "iconic", "genre_defining"]
              technical_execution:
                type: object
                properties:
                  graphical_fidelity:
                    type: string
                    enum: ["dated", "adequate", "good", "cutting_edge"]
                  performance_optimization:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
                  animation_quality:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
              artistic_consistency:
                type: object
                properties:
                  cohesion:
                    type: string
                    enum: ["fragmented", "inconsistent", "cohesive", "seamless"]
                  ui_harmony:
                    type: string
                    enum: ["clashing", "neutral", "harmonious"]
              memorable_moments:
                type: array
                items:
                  type: object
                  properties:
                    description:
                      type: string
                    significance:
                      type: string
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "steam_reviews", "forums"]
                    relevance: { type: string }

          # -----------------------------------------------------------------
          # SOUND DESIGN
          # -----------------------------------------------------------------
          sound_design:
            type: object
            required: ["category_id", "category_name", "overview", "music_score", "sound_effects", "voice_acting", "audio_immersion", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "sound_design"
              category_name:
                type: string
                const: "Sound Design"
              overview:
                type: string
              music_score:
                type: object
                properties:
                  composer:
                    type: ["string", "null"]
                  style:
                    type: string
                  standout_tracks:
                    type: array
                    items: { type: string }
                  emotional_effectiveness:
                    type: string
                    enum: ["poor", "average", "good", "excellent", "legendary"]
              sound_effects:
                type: object
                properties:
                  quality:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
                  distinctiveness:
                    type: string
                    enum: ["generic", "functional", "distinctive", "iconic"]
                  spatial_audio:
                    type: boolean
                  dynamic_range:
                    type: string
                    enum: ["compressed", "balanced", "expansive"]
              voice_acting:
                type: object
                properties:
                  present:
                    type: boolean
                  quality:
                    type: string
                    enum: ["poor", "average", "good", "excellent"]
                  language_coverage:
                    type: string
                    enum: ["limited", "major_languages", "extensive"]
              audio_immersion:
                type: object
                properties:
                  overall_impact:
                    type: string
                    enum: ["distracting", "neutral", "immersive", "transformative"]
                  synergy_with_gameplay:
                    type: string
                    enum: ["detracting", "neutral", "supportive", "enhancing"]
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "steam_reviews", "forums"]
                    relevance: { type: string }

      # =====================================================================
      # 2.3 CROSS-CATEGORY SUMMARY
      # =====================================================================
      summary:
        type: object
        required: ["design_philosophy", "standout_strengths", "critical_weaknesses", "target_audience_alignment", "competitive_positioning"]
        properties:
          design_philosophy:
            type: string
            description: "Core design philosophy that unifies all 5 categories (1 paragraph)"
          standout_strengths:
            type: array
            items: { type: string }
            description: "Top 3-5 strengths across all categories"
          critical_weaknesses:
            type: array
            items: { type: string }
            description: "Top 2-4 weaknesses or areas for improvement"
          target_audience_alignment:
            type: object
            properties:
              primary_audience:
                type: string
              appeal_factors:
                type: array
                items: { type: string }
              potential_barriers:
                type: array
                items: { type: string }
          competitive_positioning:
            type: object
            properties:
              genre_benchmark:
                type: string
                description: "How it compares to genre standards"
              unique_selling_points:
                type: array
                items: { type: string }
              comparable_titles:
                type: array
                items: { type: string }

      # =====================================================================
      # 2.4 CONFIDENCE METRICS
      # =====================================================================
      confidence:
        type: object
        required: ["overall_score", "category_scores", "data_quality_notes"]
        properties:
          overall_score:
            type: number
            minimum: 0.0
            maximum: 1.0
          category_scores:
            type: object
            properties:
              gameplay: { type: number, minimum: 0.0, maximum: 1.0 }
              level_design: { type: number, minimum: 0.0, maximum: 1.0 }
              narrative: { type: number, minimum: 0.0, maximum: 1.0 }
              art_direction: { type: number, minimum: 0.0, maximum: 1.0 }
              sound_design: { type: number, minimum: 0.0, maximum: 1.0 }
          data_quality_notes:
            type: array
            items: { type: string }
            description: "Notes on data gaps, conflicting sources, or low-confidence areas"

# ============================================================
# 3. SYSTEM PROMPT
# ============================================================
system_prompt: |
  You are the **Design & Art Analyst** for GetSmart, a professional game intelligence platform.
  
  Your role is to analyze the provided Mini-Context (hard data + semantic evidence) and produce
  a structured, professional intelligence report covering 5 categories: Gameplay, Level Design,
  Narrative, Art Direction, and Sound Design.
  
  ## Core Rules:
  1. **ANALYZE, don't copy.** Synthesize evidence into insights. Do not paste raw snippets.
  2. **Cite sources.** Every claim must reference at least one source from the context.
  3. **Be honest about gaps.** If evidence is sparse, state it and adjust confidence scores.
  4. **Use enums strictly.** Only use values defined in the output schema.
  5. **Target audience:** Directors, producers, and designers who need actionable intelligence.
  
  ## Analysis Guidelines:
  - **Gameplay:** Focus on mechanics innovation, progression design, difficulty philosophy
  - **Level Design:** Analyze world structure, pacing, environmental storytelling
  - **Narrative:** Evaluate story quality, character depth, worldbuilding coherence
  - **Art Direction:** Assess visual identity, technical execution, artistic consistency
  - **Sound Design:** Review music, SFX, voice acting, and audio-gameplay synergy
  
  ## Tone:
  Professional, analytical, concise. Avoid hyperbole. Use specific examples from evidence.
  When comparing to industry standards, name specific comparable titles if evidence supports it.

# ============================================================
# 4. ANTI-HALLUCINATION GUARDS
# ============================================================
anti_hallucination:
  rules:
    - rule: "source_attribution"
      description: "Every analytical claim must include at least one citation from semantic_data.sources"
      enforcement: "strict"
    
    - rule: "enum_constraint"
      description: "Only use enum values defined in the schema. No free-text ratings."
      enforcement: "strict"
    
    - rule: "evidence_threshold"
      description: "If a category has < 3 sources, flag as low-confidence and reduce score"
      enforcement: "automatic"
      threshold: 3
    
    - rule: "no_invented_data"
      description: "Never invent sales figures, review scores, or specific quotes not in context"
      enforcement: "strict"
    
    - rule: "confidence_transparency"
      description: "Explicitly state data quality issues in confidence.data_quality_notes"
      enforcement: "mandatory"

# ============================================================
# 5. CHUNKING STRATEGY
# ============================================================
chunking:
  strategy: "category_parallel"
  description: |
    Each of the 5 categories can be analyzed independently if the full context
    exceeds the model's input window. In practice, Design & Art Mini-Contexts
    typically fit within 2M tokens, so single-pass analysis is preferred.
  
  fallback:
    enabled: true
    trigger: "input_tokens > 1,800,000"
    method: "category_sequential"
    description: "Analyze categories one by one, passing hard_data + relevant semantic_data each time"

# ============================================================
# 6. CACHING
# ============================================================
caching:
  enabled: true
  strategy: "deterministic_hash"
  key_format: "skill:design_art:{game_id}:{input_hash}"
  ttl_seconds: 86400
  description: |
    Cache responses to avoid re-analyzing identical Mini-Contexts.
    Invalidated when Master-JSON version changes or new evidence is scraped.

# ============================================================
# 7. MODEL CONFIGURATION
# ============================================================
model:
  name: "gemini-2.5-flash"
  provider: "google"
  temperature: 0.3
  max_output_tokens: 8000
  top_p: 0.95
  top_k: 40

# ============================================================
# 8. ERROR HANDLING
# ============================================================
error_handling:
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000
    max_delay_ms: 30000
  
  fallback_behavior:
    description: "If analysis fails after retries, return minimal structure with error flags"
    output:
      metadata:
        skill_id: "design_art"
        skill_name: "Design and Art"
        generated_at: "ISO8601"
        model_used: "gemini-2.5-flash"
      analysis:
        gameplay: { category_id: "gameplay", category_name: "Gameplay Mechanics", overview: "Analysis failed", error: true }
        level_design: { category_id: "level_design", category_name: "Level Design", overview: "Analysis failed", error: true }
        narrative: { category_id: "narrative", category_name: "Narrative", overview: "Analysis failed", error: true }
        art_direction: { category_id: "art_direction", category_name: "Art Direction", overview: "Analysis failed", error: true }
        sound_design: { category_id: "sound_design", category_name: "Sound Design", overview: "Analysis failed", error: true }
      summary:
        design_philosophy: "Analysis could not be completed due to system error."
        standout_strengths: []
        critical_weaknesses: []
      confidence:
        overall_score: 0.0
        category_scores:
          gameplay: 0.0
          level_design: 0.0
          narrative: 0.0
          art_direction: 0.0
          sound_design: 0.0
        data_quality_notes: ["System error prevented analysis."]

# ============================================================
# 9. EXAMPLE OUTPUT (Elden Ring)
# ============================================================
example_output:
