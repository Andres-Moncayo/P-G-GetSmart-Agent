      genre_benchmark: "Behind industry UX standards."
      unique_selling_points:
        - "Intentional friction as design philosophy"
      comparable_titles:
        - "Dark Souls III (same UX)"
        - "The Last of Us Part II (opposite philosophy)"
    priority_recommendations:
      - recommendation: "Implement 2-3 difficulty presets"
        category: "accessibility"
        impact: "critical"
        effort: "medium"
        roi_rationale: "Highest-impact change. Addresses #1 complaint."
      - recommendation: "Add pause for offline single-player"
        category: "ui_ux"
        impact: "high"
        effort: "low"
        roi_rationale: "Low effort, high satisfaction."

  confidence:
    overall_score: 0.78
    category_scores:
      ui_ux: 0.85
      accessibility: 0.75
      localization: 0.80
    data_quality_notes:
      - "Accessibility analysis relies on specialist reviews"
      - "Localization data partially inferred from support lists"

# ============================================================
# 4. IMPLEMENTATION CONTRACT (BaseMacroSkill)
# ============================================================
implementation:
  base_class: "BaseMacroSkill"
  source_file: "backend/app/services/macro_skills/base_skill.py"
  description: |
    All macro-skills inherit from BaseMacroSkill which provides the core
    orchestration for LLM execution, retries, caching, and fallback logic.

  interfaces:
    required_methods:
      - "get_system_prompt() -> str"
      - "build_user_prompt(context: dict) -> str"
      - "get_response_model() -> Type[BaseModel]"

  ai_integration:
    primary_sdk: "google.genai (planned/current) and google-generativeai (legacy/deprecated)"
    fallback_client: "GeminiClient (HTTP fallback via httpx)"
    model: "gemini-2.5-flash"
    temperature: 0.3
    max_output_tokens: 6000
    response_format: "application/json"
    
  resilience:
    retry_policy:
      framework: "tenacity"
      max_attempts: 3
      backoff: "exponential (1s to 30s)"
      retryable_errors: ["ResourceExhausted", "InternalServerError", "ServiceUnavailable", "Timeout"]
    
  caching:
    framework: "CacheManager (Redis in-memory)"
    ttl: "86400 (24 hours)"
    key_format: "skill:{skill_id}:{game_id}:{hash}"
    hash_components: ["context_data_hash", "prompt_hash"]

# ============================================================
# 5. API ENDPOINTS
# ============================================================
endpoints:
  - method: "POST"
    path: "/api/v1/skills/user-experience"
    description: "Execute the User Experience Macro-Skill standalone"
    request_body:
      schema: "mini_context_user_experience"
    response:
      schema: "UserExperienceAnalysisOutput"
    status_codes:
      200: "Analysis completed successfully"
      400: "Invalid mini-context input"
      422: "Validation error on LLM output"
      500: "LLM generation failed after retries"
    implementation: "backend/app/api/skills_routes.py → execute_user_experience()"
