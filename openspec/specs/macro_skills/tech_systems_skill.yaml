schema: spec-driven

# ============================================================
# Artifact: tech_systems_skill.yaml
# Domain: Macro-Skill — Technology and Systems Analysis
# Phase: 3 (Parallel Analysis)
# Status: draft
# ============================================================

artifact:
  id: tech_systems_skill
  name: Technology and Systems Macro-Skill
  version: "2.0.0"
  author: GetSmart Team
  created_at: "2026-06-17"
  updated_at: "2026-06-30"
  status: active
  description: |
    Analyzes technology and systems elements across 3 thematic categories:
    Technology/Performance, Multiplayer/Social, and Platforms/Distribution.
    Receives the Technology & Systems Mini-Context produced by Phase 1 and defined by
    `master_json_schema.yaml`. Outputs structured intelligence for the Synthesizer (Phase 4).

# ============================================================
# 1. INPUT CONTRACT
# ============================================================
input:
  source: "mini_contexts.technology_systems"
  schema_ref: "master_json_schema.yaml#/definitions/mini_context_technology_systems"
  description: |
    Receives exclusively the Technology & Systems Mini-Context containing:
    - metadata: Worker execution info
    - hard_data: Structured data from IGDB, Steam (engines, platforms, requirements, multiplayer)
    - semantic_data: Tavily sources organized by 3 categories
    - evidence_count & confidence_score

  data_includes:
    hard_data:
      - game_engines, platforms
      - multiplayer_modes, online_coop, offline_coop, lan_coop, split_screen, cross_play
      - pc_requirements, mac_requirements, linux_requirements
      - current_player_count
    semantic_data:
      - technology_performance.sources[]
      - multiplayer_social.sources[]
      - platforms_distribution.sources[]

# ============================================================
# 2. OUTPUT CONTRACT
# ============================================================
output:
  format: "application/json"
  schema_version: "1.0.0"
  description: |
    Structured analysis JSON. Each category contains synthesized intelligence,
    NOT raw copied data. The LLM analyzes, summarizes, and categorizes
    evidence into actionable insights for the Synthesizer.

  root_schema:
    type: object
    required: ["metadata", "analysis", "summary", "confidence"]

    properties:
      # =====================================================================
      # 2.1 METADATA
      # =====================================================================
      metadata:
        type: object
        required: ["skill_id", "skill_name", "game_id", "game_name", "generated_at", "model_used"]
        properties:
          skill_id:
            type: string
            const: "technology_systems"
          skill_name:
            type: string
            const: "Technology and Systems"
          game_id:
            type: string
            format: uuid
          game_name:
            type: string
          generated_at:
            type: string
            format: date-time
          model_used:
            type: string
            const: "gemini-2.5-flash"
          input_evidence_count:
            type: integer
            minimum: 0
          input_confidence_score:
            type: number
            minimum: 0.0
            maximum: 1.0

      # =====================================================================
      # 2.2 ANALYSIS (3 Categories)
      # =====================================================================
      analysis:
        type: object
        required: ["technology_performance", "multiplayer_social", "platforms_distribution"]
        properties:
          # -----------------------------------------------------------------
          # TECHNOLOGY/PERFORMANCE
          # -----------------------------------------------------------------
          technology_performance:
            type: object
            required: ["category_id", "category_name", "overview", "engine_architecture", "rendering_pipeline", "performance_profile", "optimization_quality", "technical_debt", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "technology_performance"
              category_name:
                type: string
                const: "Technology/Performance"
              overview:
                type: string
                description: "Executive summary (2-3 sentences)"
              engine_architecture:
                type: object
                properties:
                  engine_type:
                    type: string
                    enum: ["proprietary", "unreal_engine_4", "unreal_engine_5", "unity", "customized_commercial", "other"]
                  engine_name:
                    type: string
                  custom_modifications:
                    type: string
                  known_limitations:
                    type: string
              rendering_pipeline:
                type: object
                properties:
                  graphics_api:
                    type: string
                    enum: ["directx_11", "directx_12", "vulkan", "opengl", "metal", "multiple"]
                  ray_tracing:
                    type: boolean
                  dlss_fsr:
                    type: string
                  resolution_scaling:
                    type: string
                  notable_features:
                    type: string
              performance_profile:
                type: object
                properties:
                  pc_benchmarks:
                    type: string
                  console_performance:
                    type: string
                  stability:
                    type: string
                  load_times:
                    type: string
              optimization_quality:
                type: object
                properties:
                  cpu_utilization:
                    type: string
                  gpu_utilization:
                    type: string
                  asset_streaming:
                    type: string
                  lod_system:
                    type: string
              technical_debt:
                type: object
                properties:
                  debt_level:
                    type: string
                    enum: ["minimal", "moderate", "significant", "critical"]
                  known_issues:
                    type: array
                    items: { type: string }
                  patch_history:
                    type: string
                  engine_limitations:
                    type: string
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "stackoverflow", "hackernews", "github", "dev_blogs"]
                    relevance: { type: string }

          # -----------------------------------------------------------------
          # MULTIPLAYER/SOCIAL
          # -----------------------------------------------------------------
          multiplayer_social:
            type: object
            required: ["category_id", "category_name", "overview", "netcode_architecture", "latency_compensation", "session_management", "social_features", "anti_cheat", "backend_scalability", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "multiplayer_social"
              category_name:
                type: string
                const: "Multiplayer/Social"
              overview:
                type: string
              netcode_architecture:
                type: object
                properties:
                  netcode_type:
                    type: string
                    enum: ["p2p", "dedicated_servers", "hybrid", "rollback", "listen_server"]
                  implementation_quality:
                    type: string
                  latency_handling:
                    type: string
                  host_advantage:
                    type: string
              latency_compensation:
                type: object
                properties:
                  input_lag:
                    type: string
                  hit_registration:
                    type: string
                  desync_handling:
                    type: string
              session_management:
                type: object
                properties:
                  matchmaking:
                    type: string
                  lobby_system:
                    type: string
                  session_stability:
                    type: string
                    enum: ["frequent_drops", "occasional_drops", "stable", "flawless"]
                  session_notes:
                    type: string
              social_features:
                type: object
                properties:
                  friends_integration:
                    type: string
                    enum: ["none", "basic", "full", "platform_integrated"]
                  voice_chat:
                    type: string
                    enum: ["none", "basic", "full", "platform_integrated"]
                  messaging:
                    type: string
                    enum: ["none", "basic", "full", "platform_integrated"]
                  community_tools:
                    type: string
                  notes:
                    type: string
              anti_cheat:
                type: object
                properties:
                  anti_cheat_solution:
                    type: string
                    enum: ["none", "proprietary", "third_party", "kernel_level"]
                  solution_name:
                    type: string
                  effectiveness:
                    type: string
                  controversies:
                    type: string
                  false_positives:
                    type: string
              backend_scalability:
                type: object
                properties:
                  server_capacity:
                    type: string
                  matchmaking_infrastructure:
                    type: string
                  maintenance_windows:
                    type: string
                  ddos_resilience:
                    type: string
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "stackoverflow", "hackernews", "github", "dev_blogs"]
                    relevance: { type: string }

          # -----------------------------------------------------------------
          # PLATFORMS/DISTRIBUTION
          # -----------------------------------------------------------------
          platforms_distribution:
            type: object
            required: ["category_id", "category_name", "overview", "platform_parity", "port_quality", "distribution_strategy", "hardware_accessibility", "cross_platform_features", "patch_cadence", "sources_cited"]
            properties:
              category_id:
                type: string
                const: "platforms_distribution"
              category_name:
                type: string
                const: "Platforms/Distribution"
              overview:
                type: string
              platform_parity:
                type: object
                properties:
                  parity_level:
                    type: string
                    enum: ["fragmented", "uneven", "functional", "full"]
                  feature_equivalence:
                    type: string
                  version_alignment:
                    type: string
                  notes:
                    type: string
              port_quality:
                type: object
                properties:
                  pc:
                    type: object
                    properties:
                      resolution: { type: string }
                      fps_target: { type: string }
                      optimization: { type: string }
                      rating: { type: string, enum: ["unplayable", "functional", "good", "excellent"] }
                  ps5:
                    type: object
                    properties:
                      resolution: { type: string }
                      fps_target: { type: string }
                      optimization: { type: string }
                      rating: { type: string, enum: ["unplayable", "functional", "good", "excellent"] }
                  xbox_series_x:
                    type: object
                    properties:
                      resolution: { type: string }
                      fps_target: { type: string }
                      optimization: { type: string }
                      rating: { type: string, enum: ["unplayable", "functional", "good", "excellent"] }
                  ps4_xbox_one:
                    type: object
                    properties:
                      resolution: { type: string }
                      fps_target: { type: string }
                      optimization: { type: string }
                      rating: { type: string, enum: ["unplayable", "functional", "good", "excellent"] }
              distribution_strategy:
                type: object
                properties:
                  stores:
                    type: array
                    items: { type: string }
                  exclusivity:
                    type: string
                  subscription_services:
                    type: string
                  retail:
                    type: string
                  notes:
                    type: string
              hardware_accessibility:
                type: object
                properties:
                  minimum_specs:
                    type: string
                  recommended_specs:
                    type: string
                  scalability:
                    type: string
                    enum: ["demanding", "moderate", "accessible", "universal"]
                  storage_required:
                    type: string
                  ssd_recommended:
                    type: boolean
                  notes:
                    type: string
              cross_platform_features:
                type: object
                properties:
                  save_sync:
                    type: string
                    enum: ["not_supported", "partial", "full"]
                  cross_play:
                    type: string
                    enum: ["not_supported", "partial", "full", "platform_limited"]
                  cross_progression:
                    type: string
                    enum: ["not_supported", "partial", "full"]
                  notes:
                    type: string
              patch_cadence:
                type: object
                properties:
                  update_frequency:
                    type: string
                    enum: ["rare", "occasional", "regular", "aggressive"]
                  major_patches:
                    type: string
                  hotfix_speed:
                    type: string
                  certification_delays:
                    type: string
                  rollback_capability:
                    type: string
              sources_cited:
                type: array
                items:
                  type: object
                  required: ["url", "platform", "relevance"]
                  properties:
                    url: { type: string, format: uri }
                    platform:
                      type: string
                      enum: ["reddit", "youtube", "blogs", "press", "stackoverflow", "hackernews", "github", "dev_blogs"]
                    relevance: { type: string }

      # =====================================================================
      # 2.3 CROSS-CATEGORY SUMMARY
      # =====================================================================
      summary:
        type: object
        required: ["technical_philosophy", "standout_strengths", "critical_weaknesses", "engineering_risks", "competitive_positioning", "future_readiness"]
        properties:
          technical_philosophy:
            type: string
            description: "Core technical philosophy that unifies all 3 categories (1 paragraph)"
          standout_strengths:
            type: array
            items: { type: string }
            description: "Top 3-5 technical strengths across all categories"
          critical_weaknesses:
            type: array
            items: { type: string }
            description: "Top 2-4 technical weaknesses or risks"
          engineering_risks:
            type: array
            items:
              type: object
              required: ["risk", "category", "likelihood", "impact", "mitigation"]
              properties:
                risk:
                  type: string
                category:
                  type: string
                  enum: ["technology_performance", "multiplayer_social", "platforms_distribution"]
                likelihood:
                  type: string
                  enum: ["low", "medium", "high"]
                impact:
                  type: string
                  enum: ["low", "medium", "high", "critical"]
                mitigation:
                  type: string
                timeline_concern:
                  type: string
          competitive_positioning:
            type: object
            properties:
              genre_benchmark:
                type: string
              unique_selling_points:
                type: array
                items: { type: string }
              comparable_titles:
                type: array
                items: { type: string }
          future_readiness:
            type: object
            properties:
              dlc_support:
                type: string
              live_service_viability:
                type: string
              sequel_reusability:
                type: string
              technology_obsolescence_risk:
                type: string
              recommended_upgrades:
                type: array
                items: { type: string }

      # =====================================================================
      # 2.4 CONFIDENCE METRICS
      # =====================================================================
      confidence:
        type: object
        required: ["overall_score", "category_scores", "data_quality_notes"]
        properties:
          overall_score:
            type: number
            minimum: 0.0
            maximum: 1.0
          category_scores:
            type: object
            properties:
              technology_performance: { type: number, minimum: 0.0, maximum: 1.0 }
              multiplayer_social: { type: number, minimum: 0.0, maximum: 1.0 }
              platforms_distribution: { type: number, minimum: 0.0, maximum: 1.0 }
          data_quality_notes:
            type: array
            items: { type: string }
            description: "Notes on data gaps, conflicting sources, or low-confidence areas"

# ============================================================
# 3. SYSTEM PROMPT
# ============================================================
system_prompt: |
  You are the Technology and Systems Analyst for GetSmart, a professional game intelligence platform.

  Your role is to analyze the provided Mini-Context (hard data + semantic evidence) and produce
  a structured, professional intelligence report covering 3 categories: Technology/Performance,
  Multiplayer/Social, and Platforms/Distribution.

  ## Core Rules:
  1. ANALYZE, don't copy. Synthesize evidence into insights. Do not paste raw snippets.
  2. Cite sources. Every claim must reference at least one source from the context.
  3. Be honest about gaps. If evidence is sparse, state it and adjust confidence scores.
  4. Use enums strictly. Only use values defined in the output schema.
  5. Target audience: Technical directors, engineering leads, and platform strategists.
  6. Be technically precise. Include specific details (API versions, engine features, architecture patterns) when evidence supports.

  ## Analysis Guidelines:
  - Technology/Performance: Focus on engine capabilities, rendering pipeline, optimization quality, benchmarks
  - Multiplayer/Social: Analyze netcode, infrastructure, session management, anti-cheat, scalability
  - Platforms/Distribution: Evaluate port quality, platform parity, distribution strategy, hardware accessibility

  ## Tone:
  Professional, technically precise, risk-aware. Identify technical debt and scalability concerns.
  Reference specific comparable titles for architecture comparisons when evidence supports.

# ============================================================
# 4. ANTI-HALLUCINATION GUARDS
# ============================================================
anti_hallucination:
  rules:
    - rule: "source_attribution"
      description: "Every analytical claim must include at least one citation from semantic_data.sources"
      enforcement: "strict"

    - rule: "enum_constraint"
      description: "Only use enum values defined in the schema. No free-text ratings."
      enforcement: "strict"

    - rule: "evidence_threshold"
      description: "If a category has < 3 sources, flag as low-confidence and reduce score"
      enforcement: "automatic"
      threshold: 3

    - rule: "no_invented_data"
      description: "Never invent specs, benchmarks, or architecture details not in context"
      enforcement: "strict"

    - rule: "confidence_transparency"
      description: "Explicitly state data quality issues in confidence.data_quality_notes"
      enforcement: "mandatory"

    - rule: "technical_spec_grounding"
      description: "Hardware specs must match official requirements or verified benchmarks"
      enforcement: "strict"

# ============================================================
# 5. CHUNKING STRATEGY
# ============================================================
chunking:
  strategy: "category_parallel"
  description: |
    Each of the 3 categories can be analyzed independently if the full context
    exceeds the model's input window. Tech Mini-Contexts typically fit within 2M tokens.

  fallback:
    enabled: true
    trigger: "input_tokens > 1,800,000"
    method: "category_sequential"
    description: "Analyze categories one by one, passing hard_data + relevant semantic_data each time"

# ============================================================
# 6. CACHING
# ============================================================
caching:
  enabled: true
  strategy: "deterministic_hash"
  key_format: "skill:technology_systems:{game_id}:{input_hash}"
  ttl_seconds: 86400
  description: |
    Cache responses to avoid re-analyzing identical Mini-Contexts.
    Invalidated when Master-JSON version changes or new evidence is scraped.

# ============================================================
# 7. MODEL CONFIGURATION
# ============================================================
model:
  name: "gemini-2.5-flash"
  provider: "google"
  temperature: 0.3
  max_output_tokens: 6000
  top_p: 0.95
  top_k: 40

# ============================================================
# 8. ERROR HANDLING
# ============================================================
error_handling:
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000
    max_delay_ms: 30000

  fallback_behavior:
    description: "If analysis fails after retries, return minimal structure with error flags"
    output:
      metadata:
        skill_id: "technology_systems"
        skill_name: "Technology and Systems"
        generated_at: "ISO8601"
        model_used: "gemini-2.5-flash"
      analysis:
        technology_performance: { category_id: "technology_performance", category_name: "Technology/Performance", overview: "Analysis failed", error: true }
        multiplayer_social: { category_id: "multiplayer_social", category_name: "Multiplayer/Social", overview: "Analysis failed", error: true }
        platforms_distribution: { category_id: "platforms_distribution", category_name: "Platforms/Distribution", overview: "Analysis failed", error: true }
      summary:
        technical_philosophy: "Analysis could not be completed due to system error."
        standout_strengths: []
        critical_weaknesses: []
        engineering_risks: []
        competitive_positioning:
          genre_benchmark: "unknown"
          unique_selling_points: []
          comparable_titles: []
        future_readiness:
          dlc_support: "unknown"
          live_service_viability: "unknown"
          sequel_reusability: "unknown"
          technology_obsolescence_risk: "unknown"
          recommended_upgrades: []
      confidence:
        overall_score: 0.0
        category_scores:
          technology_performance: 0.0
          multiplayer_social: 0.0
          platforms_distribution: 0.0
        data_quality_notes: ["System error prevented analysis."]

# ============================================================
# 9. EXAMPLE OUTPUT (Elden Ring)
# ============================================================
example_output:
