schema: spec-driven

# ============================================================
# Artifact: pipeline_contract.yaml
# Domain: Pipeline Orchestration & Tracking
# Status: active
# ============================================================

artifact:
  id: pipeline_contract
  name: Pipeline Orchestration & Tracking Contract
  version: "1.0.0"
  author: GetSmart Team
  created_at: "2026-06-30"
  status: active
  description: |
    Defines the pipeline execution model including the PipelineTracker service,
    real-time progress tracking, API call monitoring, phase state machine,
    and all pipeline management endpoints. The pipeline runs as an asyncio
    background task (not Celery) within the FastAPI event loop.

# ============================================================
# 1. PIPELINE PHASES & STATE MACHINE
# ============================================================
pipeline_phases:
  enum: "Phase"
  values:
    - id: "scraping"
      display_name: "Phase 1 · Scraping"
      weight: 0.30
      description: "Parallel execution of 4 scraper services (RAWG, Steam, Tavily, LLM)"
    - id: "analysis"
      display_name: "Phase 3 · Analysis"
      weight: 0.40
      description: "4 Macro-Skills run in parallel via asyncio.gather"
    - id: "synthesis"
      display_name: "Phase 4 · Synthesis"
      weight: 0.20
      description: "DeterministicSynthesizer produces FinalReport"
    - id: "storage"
      display_name: "Phase 4b · Storage"
      weight: 0.10
      description: "Persist report to PostgreSQL via SQLAlchemy ORM"

task_statuses:
  enum: "TaskStatus"
  values:
    - "waiting"
    - "running"
    - "paused"
    - "blocked"
    - "completed"
    - "failed"
    - "skipped"

pipeline_statuses:
  enum: "PipelineStatus"
  values:
    - "pending"
    - "running"
    - "completed"
    - "failed"

# ============================================================
# 2. PIPELINE TRACKER SERVICE
# ============================================================
pipeline_tracker:
  description: |
    In-memory singleton service that tracks pipeline execution in real-time.
    Provides phase progress, API call monitoring, subtask tracking, and logs.
    Instance: `pipeline_tracker` (global singleton in pipeline_tracker.py)
  
  source_file: "backend/app/services/pipeline_tracker.py"
  
  state:
    active_pipelines:
      type: "Dict[str, Dict]"
      description: "Currently running pipelines keyed by report_id"
    pipeline_history:
      type: "Dict[str, List[Dict]]"
      description: "Archived completed/failed pipelines"
  
  methods:
    - name: "create_pipeline"
      args: ["report_id: str", "game_name: str"]
      description: "Initialize a new pipeline tracking session"
    - name: "start_phase"
      args: ["report_id: str", "phase: Phase"]
      description: "Mark a phase as started"
    - name: "update_phase_progress"
      args: ["report_id: str", "progress: float", "message: str"]
      description: "Update progress for the current phase (0-100)"
    - name: "complete_phase"
      args: ["report_id: str", "phase: Phase"]
      description: "Mark a phase as completed, calculate duration"
    - name: "start_api_call"
      args: ["report_id: str", "api_name: str", "details: Dict", "timeout_seconds: int"]
      description: "Track start of an API call with timeout monitoring"
    - name: "complete_api_call"
      args: ["report_id: str", "api_name: str", "items_found: int", "error: str"]
      description: "Track completion of an API call"
    - name: "get_pipeline_status"
      args: ["report_id: str"]
      returns: "DetailedPipelineResponse"
      description: "Get full pipeline status snapshot"
    - name: "archive_pipeline"
      args: ["report_id: str"]
      description: "Move pipeline from active to history"
    - name: "get_pipeline_logs"
      args: ["report_id: str", "level: str"]
      returns: "List[Dict]"
      description: "Get logs filtered by level"

  progress_calculation: |
    Overall progress = sum(phase_weight × phase_progress) for all 4 phases.
    Phase weights: scraping=0.30, analysis=0.40, synthesis=0.20, storage=0.10.

# ============================================================
# 3. PIPELINE EXECUTION FLOW
# ============================================================
execution_flow:
  entry_point: "run_pipeline_with_tracking(scraper_request, report_id)"
  source_file: "backend/app/services/pipeline_tracker_enabled.py"
  
  steps:
    - step: 1
      action: "Create pipeline tracker entry"
      code: "pipeline_tracker.create_pipeline(report_id, game_name)"
    - step: 2
      action: "Start scraping phase"
      code: "pipeline_tracker.start_phase(report_id, Phase.SCRAPING)"
    - step: 3
      action: "Execute complete pipeline with DB"
      code: "run_complete_pipeline_with_db(scraper_request, tracker_report_id=report_id)"
      description: "Orchestrator runs Phase 1→2→3→4 in sequence"
    - step: 4
      action: "Mark all phases complete or failed"
    - step: 5
      action: "Pipeline stays in active_pipelines for status queries"

  orchestrator_function: "run_complete_pipeline_with_db"
  orchestrator_file: "backend/app/services/scraper/application/orchestrator.py"
  description: |
    The main orchestrator coordinates: scraping (Phase 1), consolidation into
    Mini-Contexts (Phase 2), AI analysis via 4 macro-skills (Phase 3), synthesis
    via DeterministicSynthesizer (Phase 4), and DB storage.

# ============================================================
# 4. RESPONSE MODELS
# ============================================================
models:
  PipelineResponse:
    description: "Basic response for pipeline start endpoint"
    source_file: "backend/app/models/pipelines.py"
    fields:
      report_id: { type: "str", required: true }
      phase: { type: "str", required: true }
      status: { type: "str", required: true }
      is_complete: { type: "bool", required: true }
      message: { type: "str", required: true }
      result: { type: "Dict | null", required: false }
      seconds_elapsed: { type: "float", default: 0.0 }
      seconds_remaining: { type: "float | null", required: false }
      tasks_succeeded: { type: "int", default: 0 }
      tasks_failed: { type: "int", default: 0 }
      tasks_total: { type: "int", default: 0 }

  DetailedPipelineResponse:
    description: "Enhanced response with full progress tracking"
    source_file: "backend/app/models/pipelines.py"
    fields:
      pipeline_id: { type: "str", alias: "report_id" }
      phase: { type: "Phase" }
      status: { type: "TaskStatus" }
      is_complete: { type: "bool" }
      message: { type: "str" }
      result: { type: "Dict | null" }
      db_report_id: { type: "str | null", description: "Database report record ID" }
      seconds_elapsed: { type: "float" }
      seconds_remaining: { type: "float | null" }
      current_phase_progress: { type: "float", description: "0-100 within current phase" }
      overall_progress: { type: "float", description: "0-100 overall" }
      tasks_succeeded: { type: "int" }
      tasks_failed: { type: "int" }
      tasks_skipped: { type: "int" }
      tasks_total: { type: "int" }
      phases: { type: "Dict[Phase, Dict]" }
      api_calls: { type: "List[APIStatus]" }
      current_task: { type: "str | null" }
      logs: { type: "List[Dict]", description: "Last 20 log entries" }
      scraping_durations: { type: "Dict[str, float]" }
      analysis_durations: { type: "Dict[str, float]" }
      total_records_processed: { type: "int" }

  APIStatus:
    description: "Individual API call tracking"
    fields:
      name: { type: "str", description: "API name (RAWG, Steam, Tavily)" }
      status: { type: "TaskStatus" }
      started_at: { type: "datetime | null" }
      completed_at: { type: "datetime | null" }
      duration_seconds: { type: "float | null" }
      data_items_found: { type: "int", default: 0 }
      error: { type: "str | null" }
      details: { type: "Dict" }

# ============================================================
# 5. API ENDPOINTS
# ============================================================
endpoints:
  - method: "POST"
    path: "/api/v1/games/pipeline/start"
    description: "Start the analysis pipeline for a confirmed game"
    request_body:
      game_id: { type: "str", required: true }
      source: { type: "str", default: "rawg" }
      pipeline_token: { type: "str | null" }
    response: "PipelineResponse"
    status_codes:
      200: "Pipeline started successfully"
      404: "Game not found (run search first)"
      500: "Failed to start pipeline"
    implementation: "backend/app/api/games_routes.py → start_pipeline()"

  - method: "GET"
    path: "/api/v1/games/pipeline/{report_id}/status"
    description: "Get detailed pipeline status with API call tracking"
    response: "DetailedPipelineResponse"
    status_codes:
      200: "Pipeline status returned"
      404: "Pipeline not found or archived"
      500: "Failed to get status"
    implementation: "backend/app/api/games_routes.py → get_pipeline_status_detailed()"

  - method: "POST"
    path: "/api/v1/games/pipeline/{report_id}/reset"
    description: "Reset a stuck pipeline (archives old, creates new report_id)"
    response:
      message: { type: "str" }
      old_report_id: { type: "str" }
      new_report_id: { type: "str" }
    implementation: "backend/app/api/games_routes.py → reset_pipeline()"

  - method: "GET"
    path: "/api/v1/games/pipeline/{report_id}/logs"
    description: "Get pipeline execution logs, optionally filtered by level"
    query_params:
      level: { type: "str | null", description: "Filter: info, warning, error, success" }
    response:
      report_id: { type: "str" }
      logs: { type: "List[Dict]" }
      total_logs: { type: "int" }
    implementation: "backend/app/api/games_routes.py → get_pipeline_logs()"

  # Legacy/deprecated endpoints
  - method: "GET"
    path: "/api/v1/games/scraper/api/v1/reports/{report_id}/status"
    description: "Legacy frontend compatibility endpoint — delegates to pipeline tracker"
    status: "legacy/deprecated"
    implementation: "backend/app/api/games_routes.py → get_report_status_scraper()"
