schema: spec-driven

# ============================================================
# Artifact: synthesis_skill.yaml
# Domain: Phase 4 — Synthesis and Report Generation
# Phase: 4 (Synthesis and Formatting)
# Status: draft
# ============================================================

artifact:
  id: synthesis_skill
  name: Synthesis and Report Generation
  version: "2.0.0"
  author: GetSmart Team
  created_at: "2026-06-17"
  updated_at: "2026-06-30"
  status: active
  description: |
    Unifies four Macro-Skill outputs (Design & Art, UX, Technology & Systems,
    Strategy & Market) with the Master-JSON into a single coherent, professional-grade
    intelligence report. Generates three output formats: JSON (RAG-ready), Markdown
    (UI), and PDF-ready HTML (executive deliverable).

# ============================================================
# 1. INPUT CONTRACT
# ============================================================
input:
  source: "pipeline.phase4.inputs"
  schema_ref: "master_json_schema.yaml#/definitions/synthesis_input"
  description: |
    Receives the complete Master-JSON plus all four Macro-Skill outputs.
    Validates completeness and schema compliance before synthesis begins.

  data_includes:
    master_json:
      - metadata (game_id, game_name, pipeline_version)
      - hard_data (all structured API data)
      - semantic_data (all Tavily sources by category)
      - evidence_count, confidence_score
    macro_outputs:
      design_art:
        - metadata
        - analysis (gameplay, level_design, narrative, art_direction, sound_design)
        - summary, confidence
      user_experience:
        - metadata
        - analysis (ui_ux, accessibility, localization)
        - summary, confidence
      technology_systems:
        - metadata
        - analysis (technology_performance, multiplayer_social, platforms_distribution)
        - summary, confidence
      strategy_market:
        - metadata
        - analysis (audience, business_model, retention_live_ops, production_business, marketing, cultural_impact)
        - summary, confidence

  validation_rules:
    - rule: "all_skills_present"
      description: "Exactly 4 Macro-Skill outputs required"
      enforcement: "strict"
      failure_action: "queue_retry"
      max_wait_seconds: 120
    - rule: "schema_validity"
      description: "Each output must pass its skill schema validation"
      enforcement: "strict"
      failure_action: "log_and_continue"
    - rule: "confidence_threshold"
      description: "At least 2 skills with overall_score >= 0.5"
      enforcement: "strict"
      failure_action: "flag_low_confidence"
    - rule: "source_attribution"
      description: "Every claim in Macro-Skills must have sources_cited"
      enforcement: "recommended"
      failure_action: "flag_orphaned_claims"

# ============================================================
# 2. OUTPUT CONTRACT
# ============================================================
output:
  format: "application/json"
  schema_version: "1.0.0"
  description: |
    Unified intelligence report. All three output formats (JSON, Markdown, PDF HTML)
    are generated from this single canonical structure. Semantic parity across formats
    is strictly enforced.

  formats:
    - id: "json_rag"
      name: "JSON (RAG-Ready)"
      generator: "Pydantic"
      schema: "specs/schemas/final_report_schema.json"
      storage: "PostgreSQL + ChromaDB/Pinecone"
      optimization:
        - "Chunked into semantic sections for vectorization"
        - "Each chunk includes report_id, section_id, game_id, category, confidence"
        - "Source URLs embedded as metadata for retrieval citation"

    - id: "markdown_ui"
      name: "Markdown (UI)"
      generator: "Python (markdown library)"
      template: "templates/report_markdown.md"
      storage: "PostgreSQL (text field)"
      characteristics:
        - "Hierarchical headings for navigation"
        - "Tables for structured data"
        - "Collapsible sections for deep dives"
        - "Inline confidence badges"
        - "Source links as footnotes"

    - id: "pdf_html"
      name: "PDF-Ready HTML"
      generator: "Jinja2"
      template: "templates/report_pdf.html"
      css: "templates/styles/report.css"
      storage: "PostgreSQL (text field)"
      characteristics:
        - "Print-optimized page breaks"
        - "Executive summary on page 1"
        - "Visual hierarchy with color-coded confidence"
        - "Charts/diagrams as SVG embeds"
        - "Page numbers, headers, footers"
      status: "planned — HTML content is generated but PDF rendering via WeasyPrint is not yet integrated"

  root_schema:
    type: object
    required: ["metadata", "executive_summary", "thematic_analysis", "cross_cutting_insights", "strategic_recommendations", "risk_assessment", "appendices", "confidence"]

    properties:
      # =====================================================================
      # 2.1 METADATA
      # =====================================================================
      metadata:
        type: object
        required: ["report_id", "game_id", "game_name", "generated_at", "pipeline_version", "synthesis_model", "input_skills", "output_formats", "report_classification"]
        properties:
          report_id:
            type: string
            format: uuid
          game_id:
            type: string
            format: uuid
          game_name:
            type: string
          generated_at:
            type: string
            format: date-time
          pipeline_version:
            type: string
            const: "3.0.0"
          synthesis_model:
            type: string
            const: "gemini-1.5-flash"
          input_skills:
            type: array
            items:
              type: string
              enum: ["design_art", "user_experience", "technology_systems", "strategy_market"]
          input_confidence_range:
            type: object
            properties:
              min: { type: number, minimum: 0.0, maximum: 1.0 }
              max: { type: number, minimum: 0.0, maximum: 1.0 }
          output_formats:
            type: array
            items:
              type: string
              enum: ["json", "markdown", "pdf_html"]
          report_classification:
            type: string
            enum: ["comprehensive", "partial", "low_confidence", "error"]

      # =====================================================================
      # 2.2 EXECUTIVE SUMMARY
      # =====================================================================
      executive_summary:
        type: object
        required: ["game_identity", "market_position", "key_insights", "critical_risks", "recommended_actions", "overall_confidence"]
        properties:
          game_identity:
            type: string
            description: "1-2 sentence game identification and genre positioning"
          market_position:
            type: string
            description: "Commercial and critical standing summary"
          key_insights:
            type: array
            items: { type: string }
            description: "3-5 most important strategic insights"
          critical_risks:
            type: array
            items: { type: string }
            description: "2-3 highest-priority risks or threats"
          recommended_actions:
            type: array
            items: { type: string }
            description: "Top strategic recommendations"
          overall_confidence:
            type: number
            minimum: 0.0
            maximum: 1.0

      # =====================================================================
      # 2.3 THEMATIC ANALYSIS (17 Categories Unified)
      # =====================================================================
      thematic_analysis:
        type: object
        required: ["gameplay", "level_design", "narrative", "art_direction", "sound_design", "ui_ux", "accessibility", "localization", "technology_performance", "multiplayer_social", "platforms_distribution", "audience", "business_model", "retention_live_ops", "production_business", "marketing", "cultural_impact"]
        properties:
          # Each category follows this structure:
          # <category_id>:
          #   type: object
          #   required: ["category_id", "category_name", "overview", "key_findings", "supporting_evidence", "confidence", "cross_skill_notes"]
          gameplay:
            type: object
            required: ["category_id", "category_name", "overview", "key_findings", "supporting_evidence", "confidence", "cross_skill_notes"]
            properties:
              category_id:
                type: string
                const: "gameplay"
              category_name:
                type: string
                const: "Gameplay Mechanics"
              overview:
                type: string
                description: "Unified narrative synthesizing all contributing skills"
              key_findings:
                type: array
                items: { type: string }
              supporting_evidence:
                type: array
                items:
                  type: object
                  required: ["source", "claim", "confidence", "urls"]
                  properties:
                    source:
                      type: string
                      enum: ["design_art", "user_experience", "technology_systems", "strategy_market"]
                    claim: { type: string }
                    confidence: { type: number, minimum: 0.0, maximum: 1.0 }
                    urls:
                      type: array
                      items: { type: string, format: uri }
              confidence:
                type: number
                minimum: 0.0
                maximum: 1.0
              cross_skill_notes:
                type: array
                items: { type: string }

          level_design:
            type: object
            required: ["category_id", "category_name", "overview", "key_findings", "supporting_evidence", "confidence", "cross_skill_notes"]
            properties:
              category_id: { type: string, const: "level_design" }
              category_name: { type: string, const: "Level Design" }
              overview: { type: string }
              key_findings: { type: array, items: { type: string } }
              supporting_evidence: { type: array, items: { type: object } }
              confidence: { type: number, minimum: 0.0, maximum: 1.0 }
              cross_skill_notes: { type: array, items: { type: string } }

          narrative:
            type: object
            required: ["category_id", "category_name", "overview", "key_findings", "supporting_evidence", "confidence", "cross_skill_notes"]
            properties:
