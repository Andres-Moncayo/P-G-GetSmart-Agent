              level_design: { type: number, minimum: 0.0, maximum: 1.0 }
              narrative: { type: number, minimum: 0.0, maximum: 1.0 }
              art_direction: { type: number, minimum: 0.0, maximum: 1.0 }
              sound_design: { type: number, minimum: 0.0, maximum: 1.0 }
              ui_ux: { type: number, minimum: 0.0, maximum: 1.0 }
              accessibility: { type: number, minimum: 0.0, maximum: 1.0 }
              localization: { type: number, minimum: 0.0, maximum: 1.0 }
              technology_performance: { type: number, minimum: 0.0, maximum: 1.0 }
              multiplayer_social: { type: number, minimum: 0.0, maximum: 1.0 }
              platforms_distribution: { type: number, minimum: 0.0, maximum: 1.0 }
              audience: { type: number, minimum: 0.0, maximum: 1.0 }
              business_model: { type: number, minimum: 0.0, maximum: 1.0 }
              retention_live_ops: { type: number, minimum: 0.0, maximum: 1.0 }
              production_business: { type: number, minimum: 0.0, maximum: 1.0 }
              marketing: { type: number, minimum: 0.0, maximum: 1.0 }
              cultural_impact: { type: number, minimum: 0.0, maximum: 1.0 }
          skill_contribution_weights:
            type: object
            properties:
              design_art: { type: number }
              user_experience: { type: number }
              technology_systems: { type: number }
              strategy_market: { type: number }
          data_quality_notes:
            type: array
            items: { type: string }

# ============================================================
# 3. CONFLICT RESOLUTION PROTOCOL
# ============================================================
conflict_resolution:
  hierarchy:
    - priority: 1
      rule: "source_authority"
      description: "Claim backed by official/dev blog > community inference"
      example: "SteamSpy data overrides Reddit speculation on sales"
    - priority: 2
      rule: "confidence_weighting"
      description: "Higher-confidence skill claim prevails"
      example: "Strategy (0.85) overrides UX (0.65) on market size"
    - priority: 3
      rule: "recency"
      description: "More recent source wins if both are high-confidence"
      example: "Post-DLC analysis overrides launch-week analysis"
    - priority: 4
      rule: "present_both"
      description: "If no clear winner, both claims presented with conflict note"
      example: "Design says 'revolutionary'; Strategy says 'evolutionary'"

  logging:
    required_fields:
      - conflict_id
      - topic
      - skills_in_conflict
      - claim_a
      - claim_b
      - resolution
      - rationale
      - synthesized_narrative

# ============================================================
# 4. ANTI-HALLUCINATION GUARDS
# ============================================================
anti_hallucination:
  rules:
    - rule: "no_new_evidence"
      description: "Synthesizer cannot invent sources not present in Macro-Skill outputs"
      enforcement: "strict"

    - rule: "source_chain"
      description: "Every claim must trace to Macro-Skill output and original source URL"
      enforcement: "strict"

    - rule: "confidence_inheritance"
      description: "Final confidence cannot exceed highest contributing skill confidence"
      enforcement: "strict"

    - rule: "conflict_transparency"
      description: "All unresolved conflicts logged and presented"
      enforcement: "mandatory"

    - rule: "no_extrapolation"
      description: "No projections beyond evidence (e.g., no invented sales figures)"
      enforcement: "strict"

    - rule: "format_fidelity"
      description: "Markdown/HTML cannot embellish or rephrase beyond unified JSON"
      enforcement: "strict"

# ============================================================
# 5. MULTI-FORMAT GENERATION
# ============================================================
format_generation:
  json_rag:
    generator: "Pydantic"
    schema: "specs/schemas/final_report_schema.json"
    storage: "PostgreSQL + ChromaDB/Pinecone"
    chunking:
      strategy: "semantic_sections"
      metadata_per_chunk:
        - report_id
        - section_id
        - game_id
        - category
        - confidence
        - source_urls

  markdown_ui:
    generator: "Python markdown library"
    template: "templates/report_markdown.md"
    features:
      - hierarchical_headings
      - data_tables
      - collapsible_sections
      - inline_confidence_badges
      - footnote_sources

  pdf_html:
    generator: "Jinja2"
    template: "templates/report_pdf.html"
    css: "templates/styles/report.css"
    post_processor: "WeasyPrint"
    features:
      - print_optimized_page_breaks
      - executive_summary_first_page
      - color_coded_confidence
      - svg_embeds
      - page_numbers_headers_footers

  consistency_rules:
    - "All three formats contain identical claims and scores"
    - "Every claim in every format cites its source"
    - "Confidence scores appear in all formats"
    - "No format adds content absent from unified JSON"

# ============================================================
# 6. SYSTEM PROMPT
# ============================================================
system_prompt: |
  You are the Chief Synthesis Editor for GetSmart, a professional game intelligence platform.

  Your role is to unify four parallel Macro-Skill analyses (Design & Art, UX, Technology & Systems, Strategy & Market) into a single coherent, executive-grade intelligence report.

  ## Core Rules:
  1. CURATE, don't create. You synthesize existing analysis, never introduce new evidence.
  2. Resolve conflicts transparently. When skills disagree, present both perspectives or weight by confidence.
  3. Maintain source chains. Every claim must trace back to a Macro-Skill output and its original source.
  4. Be honest about gaps. Low-confidence areas are flagged, not glossed over.
  5. Audience-aware: Front-load executive insights; layer technical depth; highlight actionable recommendations.
  6. Use enums strictly. Only values defined in the output schema.

  ## Synthesis Guidelines:
  - Executive Summary: 400-600 words. Readable in 3 minutes. Covers identity, position, top insights, critical risks.
  - Thematic Analysis: 17 categories, unified from contributing skills. Cross-reference where relevant.
  - Cross-Cutting Insights: Identify emergent patterns invisible to individual skills.
  - Recommendations: Ranked by impact/effort. Include risk-of-inaction.
  - Risks: Unified register with likelihood, impact, mitigation, and owner.

  ## Tone:
  Professional, executive, decisive but nuanced. Avoid hype. Use specific data points. When uncertain, say so explicitly.

# ============================================================
# 7. MODEL CONFIGURATION
# ============================================================
model:
  name: "gemini-2.5-pro"
  provider: "google"
  temperature: 0.2
  max_output_tokens: 16000
  top_p: 0.95
  top_k: 40

# ============================================================
# 8. CHUNKING STRATEGY
# ============================================================
chunking:
  strategy: "single_pass"
  description: |
    Full synthesis in one pass when total input fits within 2M tokens.

  fallback:
    enabled: true
    trigger: "input_tokens > 1,800,000"
    method: "section_sequential"
    steps:
      - "Synthesize Executive Summary + Metadata"
      - "Synthesize Thematic Analysis in batches of 5-6 categories"
      - "Synthesize Cross-Cutting Insights, Recommendations, Risks"
      - "Final pass: unify tone, resolve cross-batch conflicts, generate appendices"

# ============================================================
# 9. CACHING
# ============================================================
caching:
  enabled: true
  strategy: "deterministic_hash"
  key_format: "synthesis:{game_id}:{master_json_hash}:{skill_output_hash}"
  ttl_seconds: 86400
  description: |
    Cache responses to avoid re-synthesizing identical inputs.
    Invalidated when any Macro-Skill output or Master-JSON changes.

# ============================================================
# 10. ERROR HANDLING
# ============================================================
error_handling:
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 2000
    max_delay_ms: 60000

  partial_input_handling:
    - scenario: "1_skill_failed"
      behavior: "synthesize_with_3_skills"
      flag: "partial"
    - scenario: "2_plus_skills_failed"
      behavior: "abort_synthesis"
      return: "error_report_with_available_summaries"
    - scenario: "all_skills_failed"
      behavior: "return_fallback_error_report"

  fallback_behavior:
    description: "If synthesis fails after retries, return minimal error report"
    output:
      metadata:
        report_id: "error-report-uuid"
        game_id: "..."
        game_name: "..."
        generated_at: "ISO8601"
        synthesis_model: "gemini-2.5-pro"
        report_classification: "error"
        error: true
      executive_summary:
        game_identity: "Report generation failed due to insufficient or corrupted Macro-Skill outputs."
        market_position: "Unable to assess."
        key_insights: []
        critical_risks: ["System error prevented full analysis."]
        recommended_actions: ["Retry pipeline or investigate Macro-Skill failures."]
        overall_confidence: 0.0
      thematic_analysis: {}
      cross_cutting_insights: {}
      strategic_recommendations: []
      risk_assessment: []
      appendices:
        source_index: []
        confidence_breakdown: {}
        conflict_log: []
        data_gaps: ["All data gaps unknown due to system error."]
        methodology_notes: "Synthesis failed. See system logs."
      confidence:
        overall_score: 0.0
        category_scores: {}
        skill_contribution_weights: {}
        data_quality_notes: ["System error prevented synthesis."]

# ============================================================
# 11. EXAMPLE OUTPUT (Elden Ring)
# ============================================================
example_output:
  metadata:
    report_id: "rpt-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    game_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    game_name: "Elden Ring"
    generated_at: "2026-06-17T15:25:00Z"
    pipeline_version: "3.0.0"
    synthesis_model: "gemini-2.5-pro"
    input_skills: ["design_art", "user_experience", "technology_systems", "strategy_market"]
    input_confidence_range:
      min: 0.75
      max: 0.90
    output_formats: ["json", "markdown", "pdf_html"]
