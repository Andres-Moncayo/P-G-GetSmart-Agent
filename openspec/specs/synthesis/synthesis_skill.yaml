# ============================================================
# 4. IMPLEMENTATION CONTRACT (DeterministicSynthesizer)
# ============================================================
implementation:
  class_name: "DeterministicSynthesizer"
  source_file: "backend/app/services/synthesizer.py"
  description: |
    The synthesis process is handled by the DeterministicSynthesizer which uses
    gemini-1.5-flash to unify the four macro-skill outputs.

  ai_integration:
    model: "gemini-1.5-flash"
    temperature: 0.2
    max_output_tokens: 8192
    response_format: "application/json"
    response_schema: "specs/schemas/final_report_schema.json"
    
  fallback_and_retries:
    retry_policy:
      framework: "tenacity"
      max_attempts: 3
      backoff: "exponential (2s to 60s)"
      
  output_generation:
    json: "Direct output from LLM using response_schema"
    markdown: "Generated via generate_markdown() in formatters.py"
    pdf_html: "Generated via generate_pdf_html() in formatters.py"

# ============================================================
# 5. API ENDPOINTS
# ============================================================
endpoints:
  - method: "POST"
    path: "/api/v1/skills/synthesis"
    description: "Execute the Synthesis Phase standalone"
    request_body:
      schema: "synthesis_input"
    response:
      schema: "FinalReport"
    status_codes:
      200: "Synthesis completed successfully"
      400: "Invalid input missing required macro skills"
      422: "Validation error on LLM output schema"
      500: "LLM generation failed after retries"
    implementation: "backend/app/api/skills_routes.py → execute_synthesis()"
